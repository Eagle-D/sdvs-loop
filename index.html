<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control #SDVS_</title>
    <style>
        :root { --primary: #3b82f6; --bg: #111827; --card: #1f2937; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; padding: 40px; text-align: center; }
        .main-card { background: var(--card); max-width: 600px; margin: 0 auto; padding: 30px; border-radius: 16px; border: 1px solid #374151; }
        .video-selector { margin: 25px 0; }
        input[type="text"] { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #4b5563; background: #374151; color: white; margin-bottom: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: #4b5563; color: white; }
        #progressContainer { width: 100%; background: #374151; height: 10px; border-radius: 5px; margin: 15px 0; display: none; overflow: hidden; }
        #progressBar { width: 0%; height: 100%; background: #10b981; transition: 0.3s; }
    </style>
</head>
<body>

    <div class="main-card">
        <h1>🚀 Gestión de Pantalla SDVS</h1>
        
        <div class="video-selector">
            <p>1. Prepara tu vídeo local (Bajar peso):</p>
            <input type="file" id="localFile" style="display:none" accept=".mp4,.mov,.mkv,.avi,.webm">
            <button class="btn btn-secondary" onclick="document.getElementById('localFile').click()">ELEGIR Y OPTIMIZAR LOCAL</button>
            <div id="progressContainer"><div id="progressBar"></div></div>
            <p id="optStatus" style="font-size: 0.8em; color: #9ca3af;"></p>
        </div>

        <hr style="border: 0; border-top: 1px solid #374151; margin: 25px 0;">

        <div class="video-selector">
            <p>2. Sube el archivo optimizado a la nube:</p>
            <button class="btn btn-secondary" onclick="abrirSubida()">SUBIR A GITHUB (REPO)</button>
        </div>

        <hr style="border: 0; border-top: 1px solid #374151; margin: 25px 0;">

        <div class="video-selector">
            <p>3. Selecciona el vídeo ya subido para proyectar:</p>
            <input type="text" id="remoteFileName" placeholder="Nombre exacto (ej: promo_final.mp4)">
            <button class="btn btn-primary" id="launchBtn" onclick="lanzarATV()">LANZAR VIDEO A TV</button>
        </div>
    </div>

<script>
    const optStatus = document.getElementById('optStatus');
    const pContainer = document.getElementById('progressContainer');
    const pBar = document.getElementById('progressBar');
    const api = window.electronAPI;

    // Esta función ahora solo da la orden de abrir el selector nativo
    function iniciarOptimizacion() {
        if (api) {
            pContainer.style.display = 'block';
            optStatus.innerText = "Selecciona un archivo en la ventana emergente...";
            api.send('optimize-video'); // No enviamos nada, la App elegirá
        } else {
            alert("Usa la App para optimizar vídeos.");
        }
    }

    if (api) {
        api.on('optimization-status', (data) => {
            optStatus.innerText = data.msg;
            pBar.style.width = data.progress + '%';
            if (data.progress >= 100) setTimeout(() => pContainer.style.display = 'none', 5000);
        });
    }

    // El resto de funciones (abrirSubida, lanzarATV) se quedan igual...
    function abrirSubida() {
        const url = 'https://github.com/Eagle-D/sdvs-loop/upload/main';
        if (api) api.send('open-external-url', url);
    }
    function lanzarATV() {
        const name = document.getElementById('remoteFileName').value.trim();
        if (!name) return alert("Escribe el nombre del vídeo.");
        const url = "https://eagle-d.github.io/sdvs-loop/" + name;
        if (api) api.send('trigger-tv-launch', url);
    }
</script>
</body>
</html>
