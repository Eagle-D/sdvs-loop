<!DOCTYPE html>
<html>
<head>
    <title>Panel de Control #SDVS_</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; text-align: center; }
        .video-item { border: 1px solid #333; padding: 15px; margin: 10px; display: inline-block; border-radius: 8px; width: 200px; }
        button { background: #007bff; color: white; border: none; padding: 10px; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <h1>🎬 Galería de Contenidos SDVS</h1>
    
    <div class="video-item">
        <h3>Promo Principal</h3>
        <button onclick="lanzar('promo.mp4')">PROYECTAR EN TV</button>
    </div>

    <script>
        function lanzar(archivo) {
            const urlCompleta = "https://eagle-d.github.io/sdvs-loop/" + archivo;
            
            // Si estamos dentro de la App de Electron, enviamos la orden a la maquinaria
            if (window.require) {
                const { ipcRenderer } = window.require('electron');
                ipcRenderer.send('trigger-tv-launch', urlCompleta);
            } else {
                alert("Debes usar la App de escritorio para lanzar a la TV.");
            }
        }
    </script>
</body>
</html>
